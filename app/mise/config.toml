[settings]
# Supply-chain hardening: ignore versions released less than 7 days ago.
# Applies to fuzzy requests like 'latest'; gives the community time to vet new releases.
# Only backends exposing release timestamps honor this (aqua, cargo, npm, pipx, core plugins).
minimum_release_age = "7d"

[tools]
node = 'latest'
go = 'latest'
claude = "latest"
cmake = "latest"
jq = "latest"
neovim = "latest"
direnv = "latest"
fzf = "latest"
ripgrep = "latest"
kubectx = "latest"
kubens = "latest"
kubectl = "latest"
k9s = "latest"
uv = "latest"
java = "latest"
"pipx:clang-format" = "latest"
vim = "latest"
mas = "latest"
docker-compose = "latest"
gh = "latest"
gcloud = "latest"
gitleaks = "latest"
betterleaks = "latest"

[env]
NODE_ENV = 'development'

[tasks.dev]
run = 'npm run dev'
